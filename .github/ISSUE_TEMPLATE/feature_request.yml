name: ✨ Feature request
description: Suggest an idea or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the motivation — the workflow or pain point behind the request.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like ClaudeStudio to do? UI sketches and example flows welcome.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Agent Studio & Teams
        - Agentic OS (supervisor / event bus)
        - Session archive & memory
        - Brain View (knowledge graph)
        - Voice assistant
        - Task & Definition libraries
        - MCP / Hooks
        - Theming & design
        - Other
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
