name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Rust core · fmt · clippy · test
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt clippy
          rustup default stable
          rustc --version

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            core/target
          key: cargo-${{ runner.os }}-${{ hashFiles('core/Cargo.lock') }}
          restore-keys: cargo-${{ runner.os }}-

      - name: Format check
        working-directory: core
        run: cargo fmt --all -- --check

      - name: Clippy (deny warnings)
        working-directory: core
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        working-directory: core
        run: cargo test --workspace

  swift:
    name: macOS app · build · bridge test
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchains
        run: swift --version

      # Build the sidecar so the Swift integration test can drive the real
      # Rust core over the socket (otherwise that test is skipped).
      - name: Build Rust core
        working-directory: core
        run: cargo build --release -p cs-cli

      - name: Build app
        working-directory: app
        run: swift build

      - name: Test (live cross-language bridge)
        working-directory: app
        env:
          CLAUDESTUDIO_CORE_BIN: ${{ github.workspace }}/core/target/release/claudestudio-core
        run: swift test
