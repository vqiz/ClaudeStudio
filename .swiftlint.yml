# SwiftLint configuration for ClaudeStudio
# Opt-in, pragmatic rules tuned for a SwiftUI + Swift 6 concurrency codebase.

included:
  - app/Sources
  - app/Tests

excluded:
  - app/.build
  - "**/*.generated.swift"

# Rules that are off by default but we want on.
opt_in_rules:
  - array_init
  - closure_end_indentation
  - closure_spacing
  - collection_alignment
  - contains_over_filter_count
  - contains_over_first_not_nil
  - empty_collection_literal
  - empty_count
  - empty_string
  - explicit_init
  - first_where
  - force_unwrapping
  - implicitly_unwrapped_optional
  - last_where
  - legacy_multiple
  - literal_expression_end_indentation
  - modifier_order
  - multiline_arguments
  - operator_usage_whitespace
  - overridden_super_call
  - prefer_self_type_over_type_of_self
  - redundant_nil_coalescing
  - sorted_first_last
  - toggle_bool
  - unneeded_parentheses_in_closure_argument
  - vertical_whitespace_closing_braces
  - yoda_condition

disabled_rules:
  - todo            # We intentionally keep TODOs that point at the Rust core.
  - trailing_comma

# SwiftUI bodies and large enums make the defaults too tight.
type_body_length:
  warning: 600
  error: 900

file_length:
  warning: 800
  error: 1200
  ignore_comment_only_lines: true

function_body_length:
  warning: 120
  error: 200

line_length:
  warning: 140
  error: 200
  ignores_comments: true
  ignores_urls: true

identifier_name:
  min_length: 1
  excluded:
    - id
    - x
    - y
    - dx
    - dy
    - to

cyclomatic_complexity:
  warning: 20
  error: 30

nesting:
  type_level: 3

reporter: "xcode"
