# XcodeGen spec for the ClaudeStudio macOS app.
#
# Regenerate the .xcodeproj after editing this file:
#     cd app && xcodegen generate
#
# The SwiftPM Package.swift remains the source of truth for `swift build` and CI;
# this project is for GUI development/testing in Xcode (real .app bundle + icon).
name: ClaudeStudio
options:
  bundleIdPrefix: dev.claudestudio
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
targets:
  # The transport/protocol layer, built as a framework so `import ClaudeStudioKit`
  # resolves exactly as it does under SwiftPM.
  ClaudeStudioKit:
    type: framework
    platform: macOS
    sources:
      - Sources/ClaudeStudioKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.claudestudio.kit
        DEFINES_MODULE: "YES"

  # The SwiftUI app. Produces ClaudeStudio.app with the generated app icon.
  ClaudeStudio:
    type: application
    platform: macOS
    sources:
      - Sources/ClaudeStudio
      - Resources/Assets.xcassets
      # Bundle the shipped libraries so the auto-started core can find them.
      - path: ../tasks
        type: folder
        buildPhase: resources
      - path: ../definitions
        type: folder
        buildPhase: resources
    dependencies:
      - target: ClaudeStudioKit
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.claudestudio.app
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: "YES"
        INFOPLIST_KEY_CFBundleDisplayName: ClaudeStudio
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.developer-tools"
    postCompileScripts:
      # Build the Rust core and bundle it into the .app so the app can start it
      # itself — no terminal needed. Non-fatal if cargo is missing (the app then
      # falls back to a dev checkout or a core you start yourself).
      - name: "Build & bundle claudestudio-core"
        basedOnDependencyAnalysis: false
        script: |
          set -eu
          export PATH="$HOME/.cargo/bin:$PATH"
          if ! command -v cargo >/dev/null 2>&1; then
            echo "warning: cargo not found — skipping core bundle"
            exit 0
          fi
          CFG="debug"; [ "${CONFIGURATION:-Debug}" = "Release" ] && CFG="release"
          CORE="$SRCROOT/../core"
          ( cd "$CORE" && cargo build -p cs-cli $([ "$CFG" = "release" ] && echo --release) )
          DEST="$TARGET_BUILD_DIR/$EXECUTABLE_FOLDER_PATH"
          mkdir -p "$DEST"
          cp -f "$CORE/target/$CFG/claudestudio-core" "$DEST/claudestudio-core"
          echo "bundled core → $DEST/claudestudio-core"

  # Unit tests (run with ⌘U in Xcode, where XCTest is available).
  ClaudeStudioKitTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests/ClaudeStudioKitTests
    dependencies:
      - target: ClaudeStudioKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.claudestudio.kit.tests
        GENERATE_INFOPLIST_FILE: "YES"

schemes:
  ClaudeStudio:
    build:
      targets:
        ClaudeStudio: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - ClaudeStudioKitTests
