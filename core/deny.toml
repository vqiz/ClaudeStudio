# cargo-deny configuration for the ClaudeStudio Rust core.
#
# Run with: cargo deny check
#
# Goals:
#   * Fail on known security advisories.
#   * Restrict licenses to permissive, OSI-approved ones compatible with MIT.

[advisories]
version = 2
# Deny crates with security advisories or that are yanked.
yanked = "deny"
ignore = []

[licenses]
version = 2
# Permissive licenses allowed throughout the dependency tree.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "CC0-1.0",
]
# Confidence threshold for detecting a license from its text (0.0 - 1.0).
confidence-threshold = 0.8

[bans]
# Warn (do not fail) on multiple versions of the same crate; the workspace
# pins shared versions via [workspace.dependencies] but transitive duplicates
# are tolerated.
multiple-versions = "warn"
wildcards = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
